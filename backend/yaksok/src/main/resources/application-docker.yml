spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:mysql://host.docker.internal:3306/yaksok?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

services:
  api:
    environment:
      JWT_SECRET: ${JWT_SECRET}

cookie:
  secure: true
spring:
  application:
    name: yaksok
  profiles:
    active: local

  sql:
    init:
      mode: always
      platform: mysql
      encoding: UTF-8

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

#logging:
#  level:
#    org.hibernate.SQL: debug

jwt:
  secret: ${JWT_SECRET:this-is-a-very-long-jwt-secret-key-32bytes!!}

cookie:
  secure: ${COOKIE_SECURE:false}

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: ${KAKAO_REDIRECT_URI}

openai:
  api:
    key: ${OPENAI_API_KEY}
  model: gpt-4
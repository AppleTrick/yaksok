spring:
  application:
    name: yaksok

  sql:
    init:
      mode: always
      platform: mysql
      encoding: UTF-8

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug

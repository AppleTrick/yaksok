spring:
  application:
    name: yaksok

  sql:
    init:
      mode: always
      platform: mysql
      encoding: UTF-8

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/yaksok?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USER:ssafy}
    password: ${DB_PASSWORD:a505}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

logging:
  level:
    org.springframework.security: DEBUG

jwt:
  secret: ${JWT_SECRET:this-is-a-very-long-jwt-secret-key-32bytes!!}

cookie:
  secure: ${COOKIE_SECURE:false}

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: ${KAKAO_REDIRECT_URI}

openai:
  api:
    key: ${OPENAI_API_KEY}
  model: gpt-4